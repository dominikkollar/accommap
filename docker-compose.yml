version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: accommap_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-accommap}
      POSTGRES_USER: ${POSTGRES_USER:-accommap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-accommap_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-accommap}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: accommap_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-accommap}:${POSTGRES_PASSWORD:-accommap_secret}@db:5432/${POSTGRES_DB:-accommap}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: accommap_scraper
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-accommap}:${POSTGRES_PASSWORD:-accommap_secret}@db:5432/${POSTGRES_DB:-accommap}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
    volumes:
      - ./scraper:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: accommap_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
