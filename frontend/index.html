<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AccomMap — South Moravia Accommodation Price Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="brand">
        <h1>AccomMap</h1>
        <p>South Moravia · Price per Bed</p>
      </div>

      <div id="view-toggle">
        <button class="view-btn active" data-view="markers">Markers</button>
        <button class="view-btn" data-view="heatmap">Heat Map</button>
      </div>

      <div id="filters">
        <h2>Filters</h2>

        <label>Type
          <select id="filter-type">
            <option value="">All types</option>
            <option value="hotel">Hotel</option>
            <option value="pension">Pension</option>
            <option value="apartment">Apartment</option>
            <option value="hostel">Hostel</option>
            <option value="agro">Agro / Farm</option>
            <option value="wellness">Wellness</option>
            <option value="camping">Camping</option>
            <option value="winery">Winery Stay</option>
          </select>
        </label>

        <label>Max price / bed (CZK)
          <input type="range" id="filter-max-price" min="0" max="5000" step="100" value="5000" />
          <output id="price-output">5000 CZK</output>
        </label>

        <label>Min stars
          <select id="filter-stars">
            <option value="">Any</option>
            <option value="1">1+</option>
            <option value="2">2+</option>
            <option value="3">3+</option>
            <option value="4">4+</option>
            <option value="5">5</option>
          </select>
        </label>

        <fieldset id="service-filters">
          <legend>Services</legend>
          <label><input type="checkbox" id="f-breakfast" /> Breakfast included</label>
          <label><input type="checkbox" id="f-pool" /> Swimming pool</label>
          <label><input type="checkbox" id="f-spa" /> Spa / Wellness</label>
          <label><input type="checkbox" id="f-parking" /> Parking</label>
          <label><input type="checkbox" id="f-wine" /> Wine tasting</label>
          <label><input type="checkbox" id="f-pet" /> Pet friendly</label>
        </fieldset>

        <button id="apply-filters">Apply Filters</button>
        <button id="reset-filters">Reset</button>
      </div>

      <div id="stats-panel">
        <h2>Statistics</h2>
        <div id="stats-content">Loading…</div>
      </div>
    </aside>

    <main id="map-container">
      <div id="map"></div>
      <div id="loading-overlay">
        <div class="spinner"></div>
        <span>Loading accommodation data…</span>
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
